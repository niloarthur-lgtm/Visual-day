<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tempo 24h</title>
    <link rel="stylesheet" href="css/style.css"/>
    <script src="js/script.js" defer></script>
</head>
<body>

<button class="btn-settings-floating" id="btnOpenSettings" title="Configurações">
    <img src="img/icons/settings.svg" alt="Configurações" class="app-icon">
</button>

<header id="appHeader">
    <h1 id="txtAppTitle">Dia Visual</h1>
</header>

<div class="page-content active" id="pageInicio">
    <div class="container" id="mainContainer">
        <div class="content">
            <div class="chart-panel">
                <div class="canvas-container">
                    <canvas id="chartCanvas" width="320" height="320"></canvas>
                </div>
                <div class="hours-counter" id="mainHoursCounter">Total: 0h 00m / 24h</div>
                <div class="error-msg" id="mainErrorMsg"></div>
            </div>

            <div class="legend-panel" id="legendPanel"></div>
        </div>
    </div>
    
    <button class="btn-main-floating-action" id="btnOpenEdit" title="Editar Tarefas">
        <img src="img/icons/edit.svg" alt="Editar" class="app-icon src-white">
    </button>
</div>

<div class="page-content" id="pageTodos">
    <div class="container-todo" id="todoContainer">
        <div class="todo-header">
            <h2 id="txtTodoTitle">Tarefas</h2>
        </div>
        <div class="todo-list" id="todoListPanel"></div>
    </div>

    <button class="btn-main-floating-action" id="btnAddTodoItem" title="Adicionar To-Do">
        <img src="img/icons/add.svg" alt="Adicionar" class="app-icon src-white">
    </button>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" id="navBtnInicio">
        <img src="img/icons/home.svg" alt="Início" class="app-icon nav-icon-color">
        <span class="nav-label" id="lblNavInicio">Início</span>
    </button>
    <button class="nav-item" id="navBtnTodos">
        <img src="img/icons/check_box.svg" alt="To-Dos" class="app-icon nav-icon-color">
        <span class="nav-label" id="lblNavTodos">To-Dos</span>
    </button>
</nav>

<div class="bottom-sheet-overlay" id="modalEdit">
    <div class="bottom-sheet-content" id="sheetContent">
        <div class="drag-handle-container" id="dragArea">
            <div class="drag-handle"></div>
        </div>
        
        <div class="sheet-error-msg" id="sheetErrorMsg"></div>
        
        <h2 id="txtEditTitle">Editar Atividades</h2>
        
        <div class="inputs-panel" id="inputsPanel"></div>
        <div class="static-panel-footer" id="staticInputsPanel"></div>

        <button class="btn-add-task" id="btnAddTaskHours">+ Adicionar Tarefa</button>
    </div>
</div>

<div class="side-panel-overlay" id="modalSettings">
    <div class="side-panel-content" id="settingsSheetContent">
        <div class="side-panel-header">
            <h2 id="txtSettingsTitle">Configurações</h2>
            <button class="btn-close-side" id="btnCloseSettings">
                <img src="img/icons/close.svg" alt="Fechar" class="app-icon">
            </button>
        </div>
        
        <div class="settings-panel">
            <div class="setting-section">
                <h3 id="txtSectionAppearance">Aparência</h3>
                <div class="setting-row">
                    <button class="btn-toggle-theme-circle" id="btnToggleTheme">
                        <img src="img/icons/dark_mode.svg" id="themeIcon" alt="Tema" class="app-icon src-dark-toggle">
                    </button>
                    <span class="theme-label" id="themeLabel">Modo Escuro</span>
                </div>
            </div>

            <div class="setting-section">
                <h3 id="txtSectionLanguage">Idioma / Language</h3>
                <div class="select-container">
                    <select id="appLanguageSelect" class="app-select">
                        <option value="pt">Português</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="zh">简体中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
