<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tempo 24h</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"/>
    <script src="js/script.js" defer></script>
</head>
<body>

<button class="btn-settings-floating" id="btnOpenSettings" title="Configurações">
    <span class="material-icons">settings</span>
</button>

<header id="appHeader">
    <h1 id="txtAppTitle">Dia Visual</h1>
</header>

<div class="page-content active" id="pageInicio">
    <div class="container" id="mainContainer">
        <div class="content">
            <div class="chart-panel">
                <div class="canvas-container">
                    <canvas id="chartCanvas" width="320" height="320"></canvas>
                </div>
                <div class="hours-counter" id="mainHoursCounter">Total: 0 / 24h</div>
                <div class="error-msg" id="mainErrorMsg"></div>
            </div>

            <div class="legend-panel" id="legendPanel">
                </div>
        </div>
    </div>
    
    <button class="btn-main-floating-action" id="btnOpenEdit" title="Editar Tarefas">
        <span class="material-icons">edit</span>
    </button>
</div>

<div class="page-content" id="pageTodos">
    <div class="container-todo" id="todoContainer">
        <div class="todo-header">
            <h2 id="txtTodoTitle">Tarefas</h2>
        </div>
        <div class="todo-list" id="todoListPanel">
            </div>
    </div>

    <button class="btn-main-floating-action" id="btnAddTodoItem" title="Adicionar To-Do">
        <span class="material-icons">add</span>
    </button>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" id="navBtnInicio">
        <span class="material-icons">home</span>
        <span class="nav-label" id="lblNavInicio">Início</span>
    </button>
    <button class="nav-item" id="navBtnTodos">
        <span class="material-icons">check_box</span>
        <span class="nav-label" id="lblNavTodos">To-Dos</span>
    </button>
</nav>

<div class="bottom-sheet-overlay" id="modalEdit">
    <div class="bottom-sheet-content" id="sheetContent">
        <div class="drag-handle-container" id="dragArea">
            <div class="drag-handle"></div>
        </div>
        
        <div class="sheet-error-msg" id="sheetErrorMsg"></div>
        
        <h2 id="txtEditTitle">Editar Atividades</h2>
        
        <div class="inputs-panel" id="inputsPanel">
            </div>

        <button class="btn-add-task" id="btnAddTaskHours">+ Adicionar Tarefa</button>
    </div>
</div>

<div class="side-panel-overlay" id="modalSettings">
    <div class="side-panel-content" id="settingsSheetContent">
        <div class="side-panel-header">
            <h2 id="txtSettingsTitle">Configurações</h2>
            <button class="btn-close-side" id="btnCloseSettings">
                <span class="material-icons">close</span>
            </button>
        </div>
        
        <div class="settings-panel">
            <div class="setting-section">
                <h3 id="txtSectionAppearance">Aparência</h3>
                <div class="setting-row">
                    <button class="btn-toggle-theme-circle" id="btnToggleTheme">
                        <span class="material-icons" id="themeIcon">dark_mode</span>
                    </button>
                    <span class="theme-label" id="themeLabel">Modo Escuro</span>
                </div>
            </div>

            <div class="setting-section">
                <h3>Idioma / Language</h3>
                <div class="language-list">
                    <label class="language-option">
                        <input type="radio" name="appLanguage" value="pt">
                        <span class="custom-radio"></span>
                        <span class="language-name">Português</span>
                    </label>
                    <label class="language-option">
                        <input type="radio" name="appLanguage" value="en">
                        <span class="custom-radio"></span>
                        <span class="language-name">English</span>
                    </label>
                    <label class="language-option">
                        <input type="radio" name="appLanguage" value="es">
                        <span class="custom-radio"></span>
                        <span class="language-name">Español</span>
                    </label>
                    <label class="language-option">
                        <input type="radio" name="appLanguage" value="zh">
                        <span class="custom-radio"></span>
                        <span class="language-name">简体中文</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
